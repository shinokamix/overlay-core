name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  VITE_APP_ENV: ${{ github.event_name == 'pull_request' && 'staging' || 'production' }}
  VITE_ENABLE_CRASH_REPORTS: "false"

jobs:
  branch-policy:
    name: Branch Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate source branch name
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          set -euo pipefail
          echo "Branch: ${BRANCH_NAME}"

          if [[ "${BRANCH_NAME}" == "main" ]]; then
            echo "main is allowed for push events."
            exit 0
          fi

          pattern='^(feat|fix|refactor|chore|docs|test|ci)/[a-z0-9]+(-[a-z0-9]+)*$'
          if [[ ! "${BRANCH_NAME}" =~ ${pattern} ]]; then
            echo "Invalid branch name: ${BRANCH_NAME}"
            echo "Expected format: <type>/<short-kebab-name>"
            echo "Allowed types: feat, fix, refactor, chore, docs, test, ci"
            exit 1
          fi

          echo "Branch name matches policy."

  changelog-policy:
    name: Changelog Policy
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Validate changelog update policy
        uses: actions/github-script@v7
        with:
          script: |
            if (context.eventName !== "pull_request") {
              core.info("Not a pull_request event. Skipping changelog policy.");
              return;
            }

            const pullRequest = context.payload.pull_request;
            if (!pullRequest) {
              core.setFailed("Pull request payload is missing.");
              return;
            }

            const prText = `${pullRequest.title}\n${pullRequest.body ?? ""}`;
            if (/\[skip-changelog\]/i.test(prText)) {
              core.info("Found [skip-changelog] marker. Skipping changelog requirement.");
              return;
            }

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const files = [];

            for (let page = 1; ; page += 1) {
              const response = await github.rest.pulls.listFiles({
                owner,
                repo,
                pull_number: pullRequest.number,
                per_page: 100,
                page
              });

              files.push(...response.data.map((file) => file.filename));
              if (response.data.length < 100) {
                break;
              }
            }

            const touchesUserFacingPaths = files.some(
              (filePath) => filePath.startsWith("src/") || filePath.startsWith("src-tauri/")
            );

            if (!touchesUserFacingPaths) {
              core.info("No changes in src/** or src-tauri/**. Changelog update is not required.");
              return;
            }

            const hasChangelogUpdate = files.includes("CHANGELOG.md");
            if (!hasChangelogUpdate) {
              core.setFailed(
                "This PR changes src/** or src-tauri/** but does not update CHANGELOG.md. Add an entry to ## [Unreleased] or include [skip-changelog] in the PR title/body for internal-only changes."
              );
              return;
            }

            core.info("Changelog policy passed.");

  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm run test:ci

      - name: Build web app
        run: npm run build

  rust-tauri:
    name: Rust / Tauri Checks
    runs-on: windows-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Rust format check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Rust lint (clippy)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets -- -D warnings

      - name: Rust type check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: frontend
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke tests
        run: npm run e2e

  ci:
    name: CI (required)
    runs-on: ubuntu-latest
    needs: [branch-policy, changelog-policy, frontend, rust-tauri, e2e-smoke]
    timeout-minutes: 5
    steps:
      - name: Final status
        run: echo "All checks passed"
